<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voces Híbrides</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mono: 'Space Mono', 'Courier New', monospace;
      --sans: system-ui, -apple-system, Helvetica Neue, sans-serif;
    }

    html, body, #root { width: 100%; height: 100%; overflow: hidden; }

    #hydra-canvas {
      position: fixed; inset: 0;
      width: 100% !important; height: 100% !important;
      z-index: 0; display: block;
    }

    #root { position: relative; z-index: 1; }

    /* ── Panel shell ── */
    .panel {
      position: fixed;
      top: 50%; left: 75%;
      transform: translate(-50%, -50%);
      display: flex; flex-direction: column;
      width: min(540px, 44vw);
    }

    /* ============================================================
       ONÍRICO
    ============================================================ */
    .panel-onirico {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 12px 64px rgba(0,0,0,0.35);
    }

    .log-onirico {
      flex: 1; overflow-y: auto;
      padding: 28px 28px 18px;
      display: flex; flex-direction: column; gap: 12px;
      min-height: 260px; max-height: calc(80vh - 58px);
    }

    .bubble { padding: 13px 17px; max-width: 83%; font-family: var(--sans); font-size: 18px; line-height: 1.7; }
    .bubble-agent { align-self: flex-start; background: rgba(248,244,255,0.93); color: #26222e; }
    .bubble-user  { align-self: flex-end;   background: rgba(190,168,230,0.72); color: rgba(255,255,255,0.97); font-size: 18px; }
    .bubble-error { align-self: flex-start; background: rgba(255,80,60,0.10);   color: rgba(255,170,150,0.9);  font-style: italic; }

    .input-onirico { display: flex; border-top: 1px solid rgba(255,255,255,0.12); }
    .input-onirico input {
      flex: 1; background: transparent; border: none; outline: none;
      color: rgba(255,255,255,0.88); font-family: var(--sans); font-size: 18px; padding: 16px 20px;
    }
    .input-onirico input::placeholder { color: rgba(255,255,255,0.26); }
    .input-onirico button {
      background: oklch(0.70 0.15 295); border: none; color: white;
      font-family: var(--sans); font-size: 18px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase; padding: 0 26px;
      cursor: pointer; transition: background 0.2s;
    }
    .input-onirico button:hover { background: oklch(0.60 0.17 295); }

    /* ============================================================
       TERMINAL
    ============================================================ */
    .panel-terminal {
      width: min(540px, 44vw);
      position: fixed !important;
      background: rgba(6,6,8,0.74);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    .panel-terminal::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(to bottom,
        transparent 0, transparent 3px,
        rgba(255,255,255,0.013) 3px, rgba(255,255,255,0.013) 4px);
      pointer-events: none; z-index: 0;
    }
    .log-terminal, .input-terminal { position: relative; z-index: 1; }

    .log-terminal {
      flex: 1; overflow-y: auto; padding: 28px 32px 18px;
      font-family: var(--mono); font-size: 18px; line-height: 1.95; color: #d0d0d8;
      min-height: 260px; max-height: calc(86vh - 58px);
    }
    .term-user { color: #e0e0ec; margin-bottom: 2px; font-size: 18px; text-shadow: 0 0 8px rgba(0,0,0,0.8); }
    .term-agent-name {
      color: #c4c4cc;
      text-shadow: -1.5px 0 0 rgba(255,45,105,0.55), 1.5px 0 0 rgba(0,210,255,0.55);
    }
    .term-agent-body { color: #cccae0; margin-bottom: 20px; white-space: pre-wrap; }
    .term-error      { color: rgba(255,120,100,0.7); margin-bottom: 20px; font-style: italic; }

    .input-terminal {
      display: flex; align-items: center; padding: 14px 32px;
      border-top: 1px solid rgba(255,255,255,0.07); gap: 8px;
    }
    .term-prompt { color: #484850; font-family: var(--mono); font-size: 18px; }
    .input-terminal input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #c4c4cc; font-family: var(--mono); font-size: 18px; caret-color: #c4c4cc;
    }
    .input-terminal button {
      background: none; border: 1px solid rgba(255,255,255,0.14); color: #555560;
      font-family: var(--mono); font-size: 18px; padding: 4px 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .input-terminal button:hover { border-color: rgba(255,255,255,0.38); color: #aaa; }

    /* ============================================================
       HÍBRIDO
    ============================================================ */
    .panel-hibrido { width: min(540px, 44vw); }

    .log-hibrido {
      flex: 1; overflow-y: auto; padding: 32px 36px 18px;
      font-family: var(--mono); font-size: 18px; line-height: 2.1;
      min-height: 260px; max-height: calc(82vh - 58px);
    }
    .hib-user { color: rgba(255,255,255,0.90); margin-bottom: 4px; font-size: 18px; text-shadow: 0 0 10px rgba(0,0,0,0.9); }
    .hib-agent-name {
      color: rgba(255,255,255,0.88);
      text-shadow: -2px 0 0 rgba(255,45,105,0.44), 2px 0 0 rgba(0,210,255,0.44);
    }
    .hib-agent-body { color: rgba(218,208,255,0.96); margin-bottom: 22px; }
    .hib-error      { color: rgba(255,150,130,0.7);  margin-bottom: 22px; font-style: italic; }

    .input-hibrido {
      display: flex; align-items: center;
      border-top: 1px solid rgba(255,255,255,0.11);
      padding: 14px 24px; gap: 10px;
    }
    .hib-prompt { color: rgba(255,255,255,0.18); font-family: var(--mono); font-size: 18px; }
    .input-hibrido input {
      flex: 1; background: transparent; border: none; outline: none;
      color: rgba(255,255,255,0.80); font-family: var(--mono); font-size: 18px;
    }
    .input-hibrido input::placeholder { color: rgba(255,255,255,0.14); }
    .input-hibrido button {
      background: none; border: none; color: rgba(198,174,238,0.58);
      font-family: var(--mono); font-size: 18px; letter-spacing: 1px;
      cursor: pointer; transition: color 0.2s; padding: 4px 6px;
    }
    .input-hibrido button:hover { color: rgba(198,174,238,1); }

    /* ============================================================
       TYPING DOTS
    ============================================================ */
    .dots { display: flex; gap: 5px; padding: 3px 0; align-items: center; }
    .dot  { width: 5px; height: 5px; border-radius: 50%; animation: dotPulse 1.35s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.22s; }
    .dot:nth-child(3) { animation-delay: 0.44s; }
    @keyframes dotPulse {
      0%,100% { opacity: 0.22; transform: scale(0.72); }
      50%      { opacity: 1;   transform: scale(1); }
    }

    /* ============================================================
       HUD
    ============================================================ */
    .hud {
      position: fixed; display: flex; align-items: center; gap: 6px;
      font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase; z-index: 10;
    }
    .hud-right { top: 18px; right: 22px; flex-direction: column; align-items: flex-end; gap: 4px; }
    .hud-left  { top: 18px; left:  22px; }
    .s-dot { width: 5px; height: 5px; border-radius: 50%; }
    .s-connected    { background: oklch(0.76 0.14 148); }
    .s-disconnected { background: oklch(0.62 0.14 22);  }
    .s-connecting   { background: oklch(0.78 0.14 88); animation: dotPulse 0.9s ease-in-out infinite; }
    .clear-btn {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px) saturate(1.4); -webkit-backdrop-filter: blur(12px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.22); border-radius: 6px;
      padding: 5px 14px; cursor: pointer;
      font-size: 16px; letter-spacing: inherit; text-transform: inherit;
      color: rgba(255,255,255,0.85);
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .clear-btn:hover {
      background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.32);
      color: rgba(255,255,255,0.90); opacity: 1 !important;
    }

    /* ============================================================
       RECORD BUTTON
    ============================================================ */
    .rec-btn { cursor: pointer; transition: all 0.2s; white-space: nowrap; user-select: none; }

    @keyframes recPulse {
      0%,100% { opacity: 0.45; }
      50%      { opacity: 1; }
    }
    .rec-btn.recording { animation: recPulse 0.8s ease-in-out infinite; }

    .input-onirico .rec-btn {
      background: oklch(0.70 0.15 295); border: none; color: white;
      font-family: var(--sans); font-size: 18px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase; padding: 0 20px;
    }
    .input-onirico .rec-btn:hover    { background: oklch(0.60 0.17 295); }
    .input-onirico .rec-btn.recording { background: oklch(0.52 0.18 15); }

    .input-terminal .rec-btn {
      background: none; border: 1px solid rgba(255,255,255,0.14); color: #555560;
      font-family: var(--mono); font-size: 18px; padding: 4px 12px;
    }
    .input-terminal .rec-btn:hover    { border-color: rgba(255,255,255,0.38); color: #aaa; }
    .input-terminal .rec-btn.recording { border-color: rgba(255,60,60,0.5); color: rgba(255,80,80,0.7); }

    .input-hibrido .rec-btn {
      background: none; border: none; color: rgba(198,174,238,0.58);
      font-family: var(--mono); font-size: 18px; letter-spacing: 1px; padding: 4px 6px;
    }
    .input-hibrido .rec-btn:hover    { color: rgba(198,174,238,1); }
    .input-hibrido .rec-btn.recording { color: rgba(255,100,100,0.8); }

    /* ============================================================
       SCROLLBAR
    ============================================================ */
    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 2px; }

    /* ============================================================
       BUBBLE SYSTEM (notificación centrada, todos los temas)
    ============================================================ */
    .bubble-system {
      align-self: center;
      background: rgba(198,174,238,0.10);
      border: 1px solid rgba(198,174,238,0.18);
      color: rgba(198,174,238,0.60);
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      padding: 4px 14px; border-radius: 20px; font-family: var(--mono);
    }

    /* ============================================================
       MODAL NUEVA VOZ
    ============================================================ */
    .voice-modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.52);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
    }
    .voice-modal {
      background: rgba(16,14,24,0.92);
      backdrop-filter: blur(20px) saturate(1.4); -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px; padding: 32px 36px;
      max-width: 380px; width: 88%;
      box-shadow: 0 20px 72px rgba(0,0,0,0.55);
      color: rgba(255,255,255,0.78); font-family: var(--sans);
    }
    .voice-modal .modal-title {
      font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
      color: rgba(198,174,238,0.70); margin-bottom: 16px; font-family: var(--mono);
    }
    .voice-modal p {
      font-size: 13.5px; line-height: 1.75; margin-bottom: 10px;
    }
    .voice-modal .modal-note {
      font-size: 11.5px; color: rgba(255,255,255,0.38); margin-bottom: 26px;
    }
    .voice-modal .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-cancel {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
      border-radius: 6px; padding: 7px 18px; cursor: pointer;
      color: rgba(255,255,255,0.46); font-family: var(--mono); font-size: 11px;
      letter-spacing: 1px; text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }
    .modal-cancel:hover { background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.70); }
    .modal-record {
      background: rgba(198,174,238,0.14); border: 1px solid rgba(198,174,238,0.30);
      border-radius: 6px; padding: 7px 22px; cursor: pointer;
      color: rgba(198,174,238,0.90); font-family: var(--mono); font-size: 11px;
      letter-spacing: 1px; text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }
    .modal-record:hover { background: rgba(198,174,238,0.24); color: rgba(198,174,238,1); }
  </style>
</head>
<body style="font-family: system-ui">

  <canvas id="hydra-canvas"></canvas>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/hydra-synth/dist/hydra-synth.js"></script>

  <script>
    (function () {
      var canvas = document.getElementById('hydra-canvas');
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;

      var hydra = new Hydra({ canvas: canvas, detectAudio: false });

      // Alimentado por React via requestAnimationFrame
      window.__audioEnergy = 0;

      s1.initCam();

      osc(60, function () { return -0.05 + window.__audioEnergy * 0.4; }, 0.03)
        .diff(osc(60, 0.0).rotate(Math.PI / 0.2))
        .layer(src(s1).modulate(s1, function () { return 0.04 + window.__audioEnergy * 0.06; }), 9.6)
        .modulateRotate(o0, function () { return mouse.x * 0.0003 + window.__audioEnergy * 0.015; })
        .brightness(function () { return window.__audioEnergy * 0.12; })
        .contrast(function () { return 1.2 + window.__audioEnergy * 0.4; })
        .modulateScale(osc(1), function () { return -0.2 - window.__audioEnergy * 0.25; })
        .out();

      function onResize() {
        var w = window.innerWidth, h = window.innerHeight;
        canvas.width = w; canvas.height = h;
        hydra.setResolution(w, h);
      }
      window.addEventListener('resize', onResize);
    })();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    function Typing({ color = 'rgba(100,80,140,0.68)' }) {
      return (
        <div className="dots">
          <div className="dot" style={{ background: color }}/>
          <div className="dot" style={{ background: color }}/>
          <div className="dot" style={{ background: color }}/>
        </div>
      );
    }

    function App() {
      const DEFAULTS = /*EDITMODE-BEGIN*/{
        "tema":         "onirico",
        "wsUrl":        "ws://localhost:8000/ws",
        "agente":       "xyk",
        "responseType": "audio"
      }/*EDITMODE-END*/;

      const [t, setTweak] = useTweaks(DEFAULTS);

      const [msgs, setMsgs] = useState(() => {
        try { return JSON.parse(localStorage.getItem('vh_msgs') || '[]'); }
        catch { return []; }
      });
      const [input,          setInput]          = useState('');
      const [status,         setStatus]         = useState('disconnected');
      // idle | thinking | speaking | recording
      const [agentStatus,    setAgentStatus]    = useState('idle');
      const [showVoiceModal, setShowVoiceModal] = useState(false);
      const [cloneRec,       setCloneRec]       = useState(false);

      const wsRef            = useRef(null);
      const logRef           = useRef(null);
      const inpRef           = useRef(null);
      const audioCtxRef      = useRef(null);
      const analyserRef      = useRef(null);
      const sttRecorderRef   = useRef(null);   // exclusivo para STT
      const cloneRecorderRef = useRef(null);   // exclusivo para clone_voice
      const audioChunksRef   = useRef([]);
      const cloneChunksRef   = useRef([]);
      const recStartRef      = useRef(null);   // timestamp para guard de duración mínima

      useEffect(() => {
        try { localStorage.setItem('vh_msgs', JSON.stringify(msgs)); } catch {}
      }, [msgs]);

      useEffect(() => {
        if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
      }, [msgs, agentStatus]);

      // RAF: lee el analyser y alimenta Hydra con la energía de audio
      useEffect(() => {
        let raf;
        const tick = () => {
          if (analyserRef.current) {
            const data = new Uint8Array(analyserRef.current.frequencyBinCount);
            analyserRef.current.getByteFrequencyData(data);
            const avg = data.reduce((s, v) => s + v, 0) / data.length;
            window.__audioEnergy = avg / 255;
          }
          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, []);

      // Inicializa AudioContext en el primer gesto de usuario (política de autoplay)
      const initAudio = useCallback(() => {
        if (audioCtxRef.current) return;
        const ctx      = new AudioContext();
        const analyser = ctx.createAnalyser();
        analyser.fftSize = 256;
        analyser.connect(ctx.destination);
        audioCtxRef.current = ctx;
        analyserRef.current = analyser;
      }, []);

      // Reproduce el ArrayBuffer de audio recibido por WebSocket
      const playAudio = useCallback(async (arrayBuffer) => {
        initAudio();
        const ctx = audioCtxRef.current;
        if (ctx.state === 'suspended') await ctx.resume();
        try {
          const buf = await ctx.decodeAudioData(arrayBuffer.slice(0));
          const src = ctx.createBufferSource();
          src.buffer = buf;
          src.connect(analyserRef.current);
          src.start();
          setAgentStatus('speaking');
          src.onended = () => setAgentStatus('idle');
        } catch (e) {
          console.error('[Audio]', e);
          setAgentStatus('idle');
        }
      }, [initAudio]);

      // Conexión WebSocket
      const connect = useCallback(() => {
        if (wsRef.current && wsRef.current.readyState < 2) return;
        setStatus('connecting');
        try {
          const ws      = new WebSocket(t.wsUrl);
          ws.binaryType = 'arraybuffer';
          wsRef.current = ws;

          ws.onopen  = () => setStatus('connected');
          ws.onerror = () => { setStatus('disconnected'); setAgentStatus('idle'); };
          ws.onclose = () => { setStatus('disconnected'); setAgentStatus('idle'); };

          ws.onmessage = (e) => {
            // Frame binario = audio WAV del TTS
            if (e.data instanceof ArrayBuffer) {
              playAudio(e.data);
              return;
            }
            try {
              const d = JSON.parse(e.data);

              if (d.type === 'transcript') {
                setMsgs(prev => [...prev, { role: 'user', content: d.text }]);
                return;
              }
              if (d.type === 'status') {
                setAgentStatus(d.status);
                return;
              }
              if (d.type === 'text') {
                setAgentStatus('idle');
                setMsgs(prev => [...prev, { role: 'agent', content: d.text }]);
                return;
              }
              if (d.type === 'error') {
                setAgentStatus('idle');
                setMsgs(prev => [...prev, { role: 'agent', content: d.msg, error: true }]);
                return;
              }
              if (d.type === 'voice_set') {
                setMsgs(prev => [...prev, { role: 'system', content: 'voz actualizada' }]);
                return;
              }

              // Compatibilidad con otros formatos
              const text = d.response ?? d.message ?? d.text;
              if (text) {
                setAgentStatus('idle');
                setMsgs(prev => [...prev, { role: 'agent', content: String(text) }]);
              }
            } catch {}
          };
        } catch { setStatus('disconnected'); }
      }, [t.wsUrl, playAudio]);

      useEffect(() => {
        connect();
        return () => { if (wsRef.current) wsRef.current.close(); };
      }, [connect]);

      const send = useCallback(() => {
        const text = input.trim();
        if (!text) return;
        initAudio();
        setMsgs(prev => [...prev, { role: 'user', content: text }]);
        setInput('');
        if (wsRef.current?.readyState === WebSocket.OPEN) {
          wsRef.current.send(JSON.stringify({ message: text, response_type: t.responseType }));
        } else {
          setAgentStatus('idle');
          setMsgs(prev => [...prev, { role: 'agent', content: `[sin conexión — ${t.wsUrl}]`, error: true }]);
          connect();
        }
      }, [input, t.wsUrl, t.responseType, initAudio, connect]);

      const onKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

      const clear = () => {
        setMsgs([]);
        localStorage.removeItem('vh_msgs');
        inpRef.current?.focus();
      };

      // Grabación de voz para STT
      const startRec = useCallback(async () => {
        if (agentStatus === 'recording') return;
        if (cloneRecorderRef.current?.state === 'recording') return; // no interferir con clone
        initAudio();
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mr     = new MediaRecorder(stream, { mimeType: 'audio/webm' });
          audioChunksRef.current = [];
          recStartRef.current = Date.now();
          mr.ondataavailable = (e) => { if (e.data.size > 0) audioChunksRef.current.push(e.data); };
          mr.onstop = () => {
            stream.getTracks().forEach(tr => tr.stop());
            const duration = Date.now() - (recStartRef.current ?? 0);
            if (duration < 300) return; // tap accidental — ignorar
            const blob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
            blob.arrayBuffer().then(buf => {
              if (buf.byteLength < 2048) return; // webm vacío — ignorar
              if (wsRef.current?.readyState === WebSocket.OPEN) {
                wsRef.current.send(buf);
                setAgentStatus('thinking');
              }
            });
          };
          mr.start();
          sttRecorderRef.current = mr;
          setAgentStatus('recording');
        } catch (e) {
          console.error('[Mic]', e);
        }
      }, [agentStatus, initAudio]);

      const stopRec = useCallback(() => {
        if (sttRecorderRef.current?.state === 'recording') {
          sttRecorderRef.current.stop();
        }
        if (agentStatus === 'recording') setAgentStatus('idle');
      }, [agentStatus]);

      // Grabación de voz para clonar (flujo separado del STT)
      const startCloneRec = useCallback(async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mr = new MediaRecorder(stream, { mimeType: 'audio/webm' });
          cloneChunksRef.current = [];
          mr.ondataavailable = (e) => { if (e.data.size > 0) cloneChunksRef.current.push(e.data); };
          mr.onstop = async () => {
            stream.getTracks().forEach(tr => tr.stop());
            const blob = new Blob(cloneChunksRef.current, { type: 'audio/webm' });
            const buf  = await blob.arrayBuffer();
            const u8   = new Uint8Array(buf);
            let bin = '';
            for (let i = 0; i < u8.length; i++) bin += String.fromCharCode(u8[i]);
            const b64 = btoa(bin);
            if (wsRef.current?.readyState === WebSocket.OPEN) {
              wsRef.current.send(JSON.stringify({ type: 'clone_voice', data: b64 }));
            }
            setCloneRec(false);
          };
          mr.start();
          cloneRecorderRef.current = mr;
          setCloneRec(true);
        } catch (e) {
          console.error('[CloneRec]', e);
          setCloneRec(false);
        }
      }, []);

      const stopCloneRec = useCallback(() => {
        if (cloneRecorderRef.current?.state === 'recording') {
          cloneRecorderRef.current.stop();
        }
      }, []);

      const isRecording = agentStatus === 'recording';
      const isThinking  = agentStatus === 'thinking';

      const hudColor = 'rgba(255,255,255,0.85)';
      const dotClass = ({ connected:'s-connected', disconnected:'s-disconnected', connecting:'s-connecting' })[status] ?? 's-disconnected';
      const isEmpty  = msgs.length === 0;

      // Función render en vez de componente para evitar remounts en cada render
      const recBtn = () => (
        <button
          className={`rec-btn${isRecording ? ' recording' : ''}`}
          onPointerDown={startRec}
          onPointerUp={stopRec}
          onPointerLeave={stopRec}
        >
          {isRecording ? 'grabando' : 'voz'}
        </button>
      );

      return (
        <>
          {/* HUD derecho: estado WS + estado del agente */}
          <div className="hud hud-right" style={{ color: hudColor }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <div className={`s-dot ${dotClass}`}/>
              {status}
            </div>
            {agentStatus !== 'idle' && (
              <div style={{ fontSize: 9, letterSpacing: '1.6px', opacity: 0.75 }}>
                {agentStatus}
              </div>
            )}
          </div>

          <div className="hud hud-left" style={{ gap: 6 }}>
            <button className="clear-btn" onClick={clear} style={{ color: hudColor }}>
              limpiar
            </button>
            {cloneRec ? (
              <button
                className="clear-btn"
                onClick={stopCloneRec}
                style={{ color: 'rgba(255,100,100,0.80)', opacity: 1, animation: 'recPulse 0.8s ease-in-out infinite' }}
              >
                ● detener
              </button>
            ) : (
              <button
                className="clear-btn"
                onClick={() => setShowVoiceModal(true)}
                style={{ color: hudColor }}
              >
                nueva voz
              </button>
            )}
          </div>

          {/* ════════ MODAL NUEVA VOZ ════════ */}
          {showVoiceModal && (
            <div className="voice-modal-overlay" onClick={() => setShowVoiceModal(false)}>
              <div className="voice-modal" onClick={e => e.stopPropagation()}>
                <div className="modal-title">nueva voz de referencia</div>
                <p>
                  La grabación será procesada por un modelo local open-source (AllTalk / XTTS)
                  que corre en tu máquina.
                </p>
                <p className="modal-note">
                  La muestra es efímera — se usa solo durante esta sesión y no se envía
                  a ningún servidor externo.
                </p>
                <div className="modal-actions">
                  <button className="modal-cancel" onClick={() => setShowVoiceModal(false)}>cancelar</button>
                  <button className="modal-record" onClick={() => { setShowVoiceModal(false); startCloneRec(); }}>grabar</button>
                </div>
              </div>
            </div>
          )}

          {/* ════════ ONÍRICO ════════ */}
          {t.tema === 'onirico' && (
            <div className="panel panel-onirico">
              <div className="log-onirico" ref={logRef}>
                {isEmpty && (
                  <div className="bubble bubble-agent" style={{ opacity: 0.72 }}>
                    hola. soy {t.agente}.
                  </div>
                )}
                {msgs.map((m, i) =>
                  m.role === 'system'
                    ? <div key={i} className="bubble bubble-system">{m.content}</div>
                    : m.role === 'user'
                      ? <div key={i} className="bubble bubble-user">{m.content}</div>
                      : <div key={i} className={`bubble ${m.error ? 'bubble-error' : 'bubble-agent'}`}>{m.content}</div>
                )}
                {isThinking && (
                  <div className="bubble bubble-agent" style={{ padding:'10px 15px' }}>
                    <Typing />
                  </div>
                )}
              </div>
              <div className="input-onirico">
                <input
                  ref={inpRef} placeholder="escribe algo..." value={input}
                  onChange={e => setInput(e.target.value)} onKeyDown={onKey} autoFocus
                />
                {recBtn()}
                <button onClick={send}>enviar</button>
              </div>
            </div>
          )}

          {/* ════════ TERMINAL ════════ */}
          {t.tema === 'terminal' && (
            <div className="panel panel-terminal">
              <div className="log-terminal" ref={logRef}>
                {isEmpty && (
                  <div style={{ color:'#333338', marginBottom:'20px' }}>
                    {t.agente} — {t.wsUrl}
                  </div>
                )}
                {msgs.map((m, i) =>
                  m.role === 'system' ? (
                    <div key={i} className="bubble bubble-system" style={{ alignSelf:'flex-start', margin: '4px 0 12px' }}>{m.content}</div>
                  ) : m.role === 'user' ? (
                    <div key={i} className="term-user">tú: {m.content}</div>
                  ) : (
                    <div key={i}>
                      <div><span className="term-agent-name">{t.agente}:</span></div>
                      <div className={m.error ? 'term-error' : 'term-agent-body'}>{m.content}</div>
                    </div>
                  )
                )}
                {isThinking && (
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <span className="term-agent-name">{t.agente}:</span>
                    <Typing color="#444450" />
                  </div>
                )}
              </div>
              <div className="input-terminal">
                <span className="term-prompt">{'>'}</span>
                <input ref={inpRef} value={input} onChange={e => setInput(e.target.value)} onKeyDown={onKey} autoFocus />
                {recBtn()}
                <button onClick={send}>[enter]</button>
              </div>
            </div>
          )}

          {/* ════════ HÍBRIDO ════════ */}
          {t.tema === 'hibrido' && (
            <div className="panel panel-hibrido">
              <div className="log-hibrido" ref={logRef}>
                {isEmpty && (
                  <div style={{ color:'rgba(255,255,255,0.16)', fontFamily:'var(--mono)', marginBottom:'20px', letterSpacing:'0.1em' }}>
                    _ _ _
                  </div>
                )}
                {msgs.map((m, i) =>
                  m.role === 'system' ? (
                    <div key={i} className="bubble bubble-system" style={{ margin: '4px 0 12px' }}>{m.content}</div>
                  ) : m.role === 'user' ? (
                    <div key={i} className="hib-user">tú: {m.content}</div>
                  ) : (
                    <div key={i}>
                      <span className="hib-agent-name">{t.agente}:</span>
                      <div className={m.error ? 'hib-error' : 'hib-agent-body'}>{m.content}</div>
                    </div>
                  )
                )}
                {isThinking && (
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <span className="hib-agent-name">{t.agente}:</span>
                    <Typing color="rgba(198,174,238,0.48)" />
                  </div>
                )}
              </div>
              <div className="input-hibrido">
                <span className="hib-prompt">›</span>
                <input
                  ref={inpRef} value={input} onChange={e => setInput(e.target.value)}
                  onKeyDown={onKey} placeholder="..." autoFocus
                />
                {recBtn()}
                <button onClick={send}>enviar</button>
              </div>
            </div>
          )}

          {/* ════════ TWEAKS ════════ */}
          <TweaksPanel title="Voces Híbrides">
            <TweakSection label="Tema visual" />
            <TweakRadio
              label="Modo"
              value={t.tema}
              options={['onirico', 'terminal', 'hibrido']}
              onChange={v => setTweak('tema', v)}
            />
            <TweakSection label="Respuesta" />
            <TweakRadio
              label="Tipo"
              value={t.responseType}
              options={['audio', 'text']}
              onChange={v => setTweak('responseType', v)}
            />
            <TweakSection label="Conexión" />
            <TweakText
              label="WebSocket URL"
              value={t.wsUrl}
              onChange={v => setTweak('wsUrl', v)}
            />
            <TweakSection label="Identidad" />
            <TweakText
              label="Nombre del agente"
              value={t.agente}
              onChange={v => setTweak('agente', v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
