<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voces Híbrides</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mono: 'Space Mono', 'Courier New', monospace;
      --sans: system-ui, -apple-system, Helvetica Neue, sans-serif;
    }

    html, body, #root { width: 100%; height: 100%; overflow: hidden; }

    /* ── Hydra canvas ── */
    #hydra-canvas {
      position: fixed;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      z-index: 0;
      display: block;
    }

    /* ── React root sits above canvas ── */
    #root { position: relative; z-index: 1; }

    /* ── Shared panel shell ── */
    .panel {
      position: fixed;
      top: 50%; left: 75%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      width: min(540px, 44vw);
    }

    /* ============================================================
       ONÍRICO
    ============================================================ */
    .panel-onirico {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 12px 64px rgba(0,0,0,0.35);
    }

    .log-onirico {
      flex: 1; overflow-y: auto;
      padding: 28px 28px 18px;
      display: flex; flex-direction: column;
      gap: 12px;
      min-height: 260px;
      max-height: calc(80vh - 58px);
    }

    .bubble {
      padding: 13px 17px;
      max-width: 83%;
      font-family: var(--sans);
      font-size: 14.5px;
      line-height: 1.7;
    }
    .bubble-agent { align-self: flex-start; background: rgba(248,244,255,0.93); color: #26222e; }
    .bubble-user  { align-self: flex-end; background: rgba(190,168,230,0.28); color: rgba(255,255,255,0.88); }

    .input-onirico { display: flex; border-top: 1px solid rgba(255,255,255,0.12); }
    .input-onirico input {
      flex: 1; background: transparent; border: none; outline: none;
      color: rgba(255,255,255,0.88); font-family: var(--sans);
      font-size: 14px; padding: 16px 20px;
    }
    .input-onirico input::placeholder { color: rgba(255,255,255,0.26); }
    .input-onirico button {
      background: oklch(0.70 0.15 295); border: none; color: white;
      font-family: var(--sans); font-size: 11px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase; padding: 0 26px;
      cursor: pointer; transition: background 0.2s;
    }
    .input-onirico button:hover { background: oklch(0.60 0.17 295); }

    /* ============================================================
       TERMINAL
    ============================================================ */
    .panel-terminal {
      width: min(540px, 44vw);
      position: fixed !important;
      background: rgba(6,6,8,0.74);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    /* scanlines on terminal panel */
    .panel-terminal::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0, transparent 3px,
        rgba(255,255,255,0.013) 3px, rgba(255,255,255,0.013) 4px
      );
      pointer-events: none;
      z-index: 0;
    }
    .log-terminal, .input-terminal { position: relative; z-index: 1; }

    .log-terminal {
      flex: 1; overflow-y: auto;
      padding: 28px 32px 18px;
      font-family: var(--mono); font-size: 13.5px;
      line-height: 1.95; color: #c4c4cc;
      min-height: 260px; max-height: calc(86vh - 58px);
    }

    .term-user { color: #888896; margin-bottom: 2px; }
    .term-agent-name {
      color: #c4c4cc;
      text-shadow:
        -1.5px 0 0 rgba(255,45,105,0.55),
         1.5px 0 0 rgba(0,210,255,0.55);
    }
    .term-agent-body { color: #aaa8c0; margin-bottom: 20px; white-space: pre-wrap; }

    .input-terminal {
      display: flex; align-items: center;
      padding: 14px 32px;
      border-top: 1px solid rgba(255,255,255,0.07);
      gap: 8px;
    }
    .term-prompt { color: #484850; font-family: var(--mono); font-size: 13.5px; }
    .input-terminal input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #c4c4cc; font-family: var(--mono); font-size: 13.5px; caret-color: #c4c4cc;
    }
    .input-terminal button {
      background: none; border: 1px solid rgba(255,255,255,0.14); color: #555560;
      font-family: var(--mono); font-size: 11px; padding: 4px 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .input-terminal button:hover { border-color: rgba(255,255,255,0.38); color: #aaa; }

    /* ============================================================
       HÍBRIDO
    ============================================================ */
    .panel-hibrido { width: min(540px, 44vw); }

    .log-hibrido {
      flex: 1; overflow-y: auto;
      padding: 32px 36px 18px;
      font-family: var(--mono); font-size: 13px;
      line-height: 2.1;
      min-height: 260px; max-height: calc(82vh - 58px);
    }

    .hib-user { color: rgba(255,255,255,0.30); margin-bottom: 4px; }
    .hib-agent-name {
      color: rgba(255,255,255,0.88);
      text-shadow:
        -2px 0 0 rgba(255,45,105,0.44),
         2px 0 0 rgba(0,210,255,0.44);
    }
    .hib-agent-body { color: rgba(218,208,255,0.88); margin-bottom: 22px; }

    .input-hibrido {
      display: flex; align-items: center;
      border-top: 1px solid rgba(255,255,255,0.11);
      padding: 14px 24px; gap: 10px;
    }
    .hib-prompt { color: rgba(255,255,255,0.18); font-family: var(--mono); font-size: 14px; }
    .input-hibrido input {
      flex: 1; background: transparent; border: none; outline: none;
      color: rgba(255,255,255,0.80); font-family: var(--mono); font-size: 13px;
    }
    .input-hibrido input::placeholder { color: rgba(255,255,255,0.14); }
    .input-hibrido button {
      background: none; border: none;
      color: rgba(198,174,238,0.58); font-family: var(--mono);
      font-size: 11px; letter-spacing: 1px;
      cursor: pointer; transition: color 0.2s; padding: 4px 6px;
    }
    .input-hibrido button:hover { color: rgba(198,174,238,1); }

    /* ============================================================
       TYPING DOTS
    ============================================================ */
    .dots { display: flex; gap: 5px; padding: 3px 0; align-items: center; }
    .dot  { width: 5px; height: 5px; border-radius: 50%; animation: dotPulse 1.35s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.22s; }
    .dot:nth-child(3) { animation-delay: 0.44s; }
    @keyframes dotPulse {
      0%,100% { opacity: 0.22; transform: scale(0.72); }
      50%      { opacity: 1;   transform: scale(1); }
    }

    /* ============================================================
       HUD
    ============================================================ */
    .hud {
      position: fixed;
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase;
      z-index: 10;
    }
    .hud-right { top: 18px; right: 22px; }
    .hud-left  { top: 18px; left:  22px; }
    .s-dot { width: 5px; height: 5px; border-radius: 50%; }
    .s-connected    { background: oklch(0.76 0.14 148); }
    .s-disconnected { background: oklch(0.62 0.14 22); }
    .s-connecting   { background: oklch(0.78 0.14 88); animation: dotPulse 0.9s ease-in-out infinite; }
    .clear-btn {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px) saturate(1.4);
      -webkit-backdrop-filter: blur(12px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      padding: 5px 14px;
      cursor: pointer;
      font-size: inherit; letter-spacing: inherit; text-transform: inherit;
      color: rgba(255,255,255,0.55);
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .clear-btn:hover {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.32);
      color: rgba(255,255,255,0.90);
      opacity: 1 !important;
    }

    /* ============================================================
       SCROLLBAR
    ============================================================ */
    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 2px; }
  </style>
</head>
<body style="font-family: system-ui">

  <!-- ── Hydra full-screen canvas ── -->
  <canvas id="hydra-canvas"></canvas>

  <div id="root"></div>

  <!-- Hydra synth library -->
  <script src="https://cdn.jsdelivr.net/npm/hydra-synth/dist/hydra-synth.js"></script>

  <!-- Hydra sketch init -->
  <script>
    (function () {
      var canvas = document.getElementById('hydra-canvas');
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;

      var hydra = new Hydra({
        canvas: canvas,
        detectAudio: false,
      });

      s1.initCam();

      osc(60, -0.05, 0.03)
        .diff(osc(60, 0.0).rotate(Math.PI / 0.2))
        .layer(src(s1).modulate(s1, 0.04), 9.6)
        .modulateRotate(o0, function () { return mouse.x * 0.0003; })
        .brightness(0)
        .contrast(1.2)
        .modulateScale(osc(1), -0.2)
        .out();

      function onResize() {
        var w = window.innerWidth;
        var h = window.innerHeight;
        canvas.width  = w;
        canvas.height = h;
        hydra.setResolution(w, h);
      }
      window.addEventListener('resize', onResize);
    })();
  </script>

  <!-- React app -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Typing dots ─────────────────────────────── */
    function Typing({ color = 'rgba(100,80,140,0.68)' }) {
      return (
        <div className="dots">
          <div className="dot" style={{ background: color }}/>
          <div className="dot" style={{ background: color }}/>
          <div className="dot" style={{ background: color }}/>
        </div>
      );
    }

    /* ── Main App ────────────────────────────────── */
    function App() {
      const DEFAULTS = /*EDITMODE-BEGIN*/{
        "tema":   "onirico",
        "wsUrl":  "ws://localhost:8000/ws",
        "agente": "xyk"
      }/*EDITMODE-END*/;

      const [t, setTweak] = useTweaks(DEFAULTS);

      const [msgs, setMsgs] = useState(() => {
        try { return JSON.parse(localStorage.getItem('vh_msgs') || '[]'); }
        catch { return []; }
      });
      const [input,  setInput]  = useState('');
      const [typing, setTyping] = useState(false);
      const [status, setStatus] = useState('disconnected');

      const wsRef  = useRef(null);
      const logRef = useRef(null);
      const inpRef = useRef(null);

      useEffect(() => {
        try { localStorage.setItem('vh_msgs', JSON.stringify(msgs)); } catch {}
      }, [msgs]);

      useEffect(() => {
        if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
      }, [msgs, typing]);

      const connect = useCallback(() => {
        if (wsRef.current && wsRef.current.readyState < 2) return;
        setStatus('connecting');
        try {
          const ws = new WebSocket(t.wsUrl);
          wsRef.current = ws;
          ws.onopen    = ()  => setStatus('connected');
          ws.onerror   = ()  => { setStatus('disconnected'); setTyping(false); };
          ws.onclose   = ()  => { setStatus('disconnected'); setTyping(false); };
          ws.onmessage = (e) => {
            setTyping(false);
            let text = e.data;
            try {
              const d = JSON.parse(e.data);
              text = d.response ?? d.message ?? d.text ?? text;
            } catch {}
            setMsgs(prev => [...prev, { role: 'agent', content: String(text) }]);
          };
        } catch { setStatus('disconnected'); }
      }, [t.wsUrl]);

      useEffect(() => {
        connect();
        return () => { if (wsRef.current) wsRef.current.close(); };
      }, [t.wsUrl]);

      const send = useCallback(() => {
        const text = input.trim();
        if (!text) return;
        setMsgs(prev => [...prev, { role: 'user', content: text }]);
        setInput('');
        setTyping(true);
        if (wsRef.current?.readyState === WebSocket.OPEN) {
          wsRef.current.send(JSON.stringify({ message: text }));
        } else {
          setTimeout(() => {
            setTyping(false);
            setMsgs(prev => [...prev, {
              role: 'agent',
              content: `[sin conexión — reconectar a ${t.wsUrl}]`
            }]);
            connect();
          }, 1200);
        }
      }, [input, t.wsUrl, connect]);

      const onKey = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
      };

      const clear = () => {
        setMsgs([]);
        localStorage.removeItem('vh_msgs');
        inpRef.current?.focus();
      };

      const hudColor = 'rgba(255,255,255,0.46)';
      const dotClass = ({ connected:'s-connected', disconnected:'s-disconnected', connecting:'s-connecting' })[status] ?? 's-disconnected';
      const isEmpty  = msgs.length === 0;

      return (
        <>
          {/* ── HUD ── */}
          <div className="hud hud-right" style={{ color: hudColor }}>
            <div className={`s-dot ${dotClass}`}/>
            {status}
          </div>
          <button className="hud hud-left clear-btn" onClick={clear} style={{ color: hudColor, opacity: 0.55 }}>
            limpiar
          </button>

          {/* ════════ ONÍRICO ════════ */}
          {t.tema === 'onirico' && (
            <div className="panel panel-onirico">
              <div className="log-onirico" ref={logRef}>
                {isEmpty && (
                  <div className="bubble bubble-agent" style={{ opacity: 0.72 }}>
                    hola. soy {t.agente}.
                  </div>
                )}
                {msgs.map((m, i) =>
                  m.role === 'user'
                    ? <div key={i} className="bubble bubble-user">{m.content}</div>
                    : <div key={i} className="bubble bubble-agent">{m.content}</div>
                )}
                {typing && (
                  <div className="bubble bubble-agent" style={{ padding:'10px 15px' }}>
                    <Typing />
                  </div>
                )}
              </div>
              <div className="input-onirico">
                <input
                  ref={inpRef}
                  placeholder="escribe algo..."
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={onKey}
                  autoFocus
                />
                <button onClick={send}>enviar</button>
              </div>
            </div>
          )}

          {/* ════════ TERMINAL ════════ */}
          {t.tema === 'terminal' && (
            <div className="panel panel-terminal">
              <div className="log-terminal" ref={logRef}>
                {isEmpty && (
                  <div style={{ color:'#333338', marginBottom:'20px' }}>
                    {t.agente} — {t.wsUrl}
                  </div>
                )}
                {msgs.map((m, i) =>
                  m.role === 'user' ? (
                    <div key={i} className="term-user">tú: {m.content}</div>
                  ) : (
                    <div key={i}>
                      <div><span className="term-agent-name">{t.agente}:</span></div>
                      <div className="term-agent-body">{m.content}</div>
                    </div>
                  )
                )}
                {typing && (
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <span className="term-agent-name">{t.agente}:</span>
                    <Typing color="#444450" />
                  </div>
                )}
              </div>
              <div className="input-terminal">
                <span className="term-prompt">{'>'}</span>
                <input
                  ref={inpRef}
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={onKey}
                  autoFocus
                />
                <button onClick={send}>[enter]</button>
              </div>
            </div>
          )}

          {/* ════════ HÍBRIDO ════════ */}
          {t.tema === 'hibrido' && (
            <div className="panel panel-hibrido">
              <div className="log-hibrido" ref={logRef}>
                {isEmpty && (
                  <div style={{ color:'rgba(255,255,255,0.16)', fontFamily:'var(--mono)', marginBottom:'20px', letterSpacing:'0.1em' }}>
                    _ _ _
                  </div>
                )}
                {msgs.map((m, i) =>
                  m.role === 'user' ? (
                    <div key={i} className="hib-user">tú: {m.content}</div>
                  ) : (
                    <div key={i}>
                      <span className="hib-agent-name">{t.agente}:</span>
                      <div className="hib-agent-body">{m.content}</div>
                    </div>
                  )
                )}
                {typing && (
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <span className="hib-agent-name">{t.agente}:</span>
                    <Typing color="rgba(198,174,238,0.48)" />
                  </div>
                )}
              </div>
              <div className="input-hibrido">
                <span className="hib-prompt">›</span>
                <input
                  ref={inpRef}
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={onKey}
                  placeholder="..."
                  autoFocus
                />
                <button onClick={send}>enviar</button>
              </div>
            </div>
          )}

          {/* ════════ TWEAKS ════════ */}
          <TweaksPanel title="Voces Híbrides">
            <TweakSection label="Tema visual" />
            <TweakRadio
              label="Modo"
              value={t.tema}
              options={['onirico', 'terminal', 'hibrido']}
              onChange={v => setTweak('tema', v)}
            />
            <TweakSection label="Conexión" />
            <TweakText
              label="WebSocket URL"
              value={t.wsUrl}
              onChange={v => setTweak('wsUrl', v)}
            />
            <TweakSection label="Identidad" />
            <TweakText
              label="Nombre del agente"
              value={t.agente}
              onChange={v => setTweak('agente', v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
